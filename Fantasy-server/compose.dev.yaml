services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: fantasy
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: fantasy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  fantasy.server:
    image: fantasy.server
    build:
      context: .
      dockerfile: Fantasy.Server/dev.dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=postgres;Port=5432;Database=fantasy;Username=fantasy;Password=fantasy
      - ConnectionStrings__Redis=redis:6379
    volumes:
      - .:/src
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
