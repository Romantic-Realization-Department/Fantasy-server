services:
  fantasy-db:
    image: postgres:17
    environment:
      POSTGRES_DB: fantasy
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: fantasy
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fantasy-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  fantasy-server:
    image: fantasy.server
    build:
      context: .
      dockerfile: Fantasy.Server/dev.dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=fantasy-db;Port=5432;Database=fantasy;Username=fantasy;Password=fantasy
      - ConnectionStrings__Redis=fantasy-redis:6379
    volumes:
      - .:/src
    depends_on:
      - fantasy-db
      - fantasy-redis

volumes:
  postgres_data:
